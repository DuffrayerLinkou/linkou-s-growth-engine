<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7C3AED" />
  <title>Offline — Agência Linkou</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0F;
      color: #f4f4f5;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 420px; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(124,58,237,.15);
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #7C3AED; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .75rem; }
    p { color: #a1a1aa; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #7C3AED; color: #fff; border: none; border-radius: .5rem;
      padding: .75rem 2rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.008" />
      </svg>
    </div>
    <h1>Você está offline</h1>
    <p>Parece que sua conexão caiu. Verifique sua internet e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
